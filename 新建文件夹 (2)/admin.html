<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Kitty 英语单词打卡 - 管理员页面</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- GSAP 动画库 -->
    <script src="https://cdn.bootcdn.net/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF9AA2',
                        secondary: '#FFB7B2',
                        accent: '#FFDAC1',
                        light: '#E2F0CB',
                        dark: '#B5EAD7',
                        pink: {
                            100: '#FFF5F5',
                            200: '#FEE7E7',
                            300: '#FED7D7',
                            400: '#FBBEB8',
                            500: '#FF9AA2',
                            600: '#FC8181',
                            700: '#F56565',
                            800: '#E53E3E',
                            900: '#C53030',
                        }
                    },
                    fontFamily: {
                        sans: ['Arial Rounded MT Bold', 'Varela Round', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            }
            .text-shadow-lg {
                text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
            }
            .bg-pattern {
                background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffb7b2' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            }
        }
    </style>
    <style>
        body {
            font-family: 'Arial Rounded MT Bold', 'Varela Round', sans-serif;
            background-color: #FFF5F5;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffb7b2' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        .hello-kitty-card {
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 154, 162, 0.3);
            transition: all 0.3s ease;
        }
        
        .hello-kitty-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 154, 162, 0.4);
        }
        
        .btn-pink {
            background-color: #FF9AA2;
            color: white;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 154, 162, 0.3);
        }
        
        .btn-pink:hover {
            background-color: #FC8181;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(255, 154, 162, 0.4);
        }
        
        .btn-gray {
            background-color: #E2E8F0;
            color: #4A5568;
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-gray:hover {
            background-color: #CBD5E0;
            transform: translateY(-2px);
        }
        
        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
        }
        
        .image-container img {
            transition: transform 0.3s ease;
        }
        
        .image-container:hover img {
            transform: scale(1.05);
        }
        
        .status-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .status-pending {
            background-color: #FFC107;
            color: #856404;
        }
        
        .status-approved {
            background-color: #28A745;
            color: white;
        }
        
        .status-rejected {
            background-color: #DC3545;
            color: white;
        }
        
        .action-btn {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
        }
        
        .pagination-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .pagination-btn:hover {
            background-color: #FFB7B2;
            color: white;
        }
        
        .pagination-btn.active {
            background-color: #FF9AA2;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- 导航栏 -->
    <nav class="bg-pink-500 text-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <img src="https://p11-doubao-search-sign.byteimg.com/isp-i18n-media/img/f53d7811386ff4614063cc8cf4f2f44b~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1794621742&x-signature=ZZsgGY9%2BtTPh0J%2FInYOnnRGtGVs%3D" alt="Hello Kitty Logo" class="h-10 w-10">
                <span class="text-xl font-bold">Hello Kitty 英语打卡 - 管理员页面</span>
            </div>
            <div>
                <button id="logoutBtn" class="bg-white text-pink-500 px-4 py-2 rounded-full font-bold hover:bg-pink-100 transition duration-300 flex items-center">
                    <i class="fa fa-sign-out mr-2"></i>退出登录
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 统计信息 -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="hello-kitty-card bg-white p-6 rounded-2xl">
                <div class="flex items-center">
                    <div class="bg-pink-100 p-3 rounded-full">
                        <i class="fa fa-file-image-o text-pink-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <h3 class="text-gray-500">总上传数</h3>
                        <p id="totalUploads" class="text-2xl font-bold text-pink-600">0</p>
                    </div>
                </div>
            </div>
            
            <div class="hello-kitty-card bg-white p-6 rounded-2xl">
                <div class="flex items-center">
                    <div class="bg-green-100 p-3 rounded-full">
                        <i class="fa fa-check-circle text-green-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <h3 class="text-gray-500">已审核</h3>
                        <p id="approvedUploads" class="text-2xl font-bold text-green-600">0</p>
                    </div>
                </div>
            </div>
            
            <div class="hello-kitty-card bg-white p-6 rounded-2xl">
                <div class="flex items-center">
                    <div class="bg-yellow-100 p-3 rounded-full">
                        <i class="fa fa-clock-o text-yellow-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <h3 class="text-gray-500">待审核</h3>
                        <p id="pendingUploads" class="text-2xl font-bold text-yellow-600">0</p>
                    </div>
                </div>
            </div>
            
            <div class="hello-kitty-card bg-white p-6 rounded-2xl">
                <div class="flex items-center">
                    <div class="bg-blue-100 p-3 rounded-full">
                        <i class="fa fa-calendar text-blue-500 text-2xl"></i>
                    </div>
                    <div class="ml-4">
                        <h3 class="text-gray-500">今日上传</h3>
                        <p id="todayUploads" class="text-2xl font-bold text-blue-600">0</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 搜索和筛选 -->
        <div class="hello-kitty-card bg-white p-6 rounded-2xl mb-8">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between">
                <div class="flex items-center mb-4 md:mb-0">
                    <div class="relative">
                        <input type="text" id="searchInput" class="pl-10 pr-4 py-2 border border-pink-300 rounded-full focus:outline-none focus:ring-2 focus:ring-pink-500" placeholder="搜索...">
                        <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                    <select id="filterSelect" class="ml-4 border border-pink-300 rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-pink-500">
                        <option value="all">全部状态</option>
                        <option value="pending">待审核</option>
                        <option value="approved">已审核</option>
                        <option value="rejected">已拒绝</option>
                    </select>
                </div>
                <div>
                    <button id="refreshBtn" class="btn-pink">
                        <i class="fa fa-refresh mr-2"></i>刷新
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 上传列表 -->
        <div class="hello-kitty-card bg-white p-6 rounded-2xl mb-8">
            <h2 class="text-2xl font-bold text-pink-600 mb-6">上传记录</h2>
            <div id="uploadsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 上传记录将通过 JavaScript 动态添加 -->
                <div class="text-center col-span-full py-10" id="noUploadsMessage">
                    <img src="https://p26-doubao-search-sign.byteimg.com/isp-i18n-media/img/494b4ce3376749b0530da7d8a4a83377~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1794621742&x-signature=TMizkNOTHusELPqZ7L30nQcpusY%3D" alt="No Uploads" class="w-32 h-32 mx-auto mb-4 opacity-50">
                    <p class="text-gray-500">暂无上传记录</p>
                </div>
            </div>
            
            <!-- 分页 -->
            <div id="pagination" class="flex justify-center mt-8">
                <!-- 分页按钮将通过 JavaScript 动态添加 -->
            </div>
        </div>
    </main>

    <!-- 底部信息 -->
    <footer class="bg-pink-500 text-white py-6 mt-16">
        <div class="container mx-auto px-4 text-center">
            <p>Hello Kitty 英语单词打卡 © 2023</p>
            <p class="text-sm mt-2">管理员页面 - 仅用于查看上传记录 💖</p>
        </div>
    </footer>

    <!-- 图片预览模态框 -->
    <div id="previewModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden">
        <div class="relative max-w-4xl w-full mx-4">
            <button id="closePreviewModal" class="absolute -top-12 right-0 text-white hover:text-pink-300">
                <i class="fa fa-times text-2xl"></i>
            </button>
            <img id="previewModalImage" class="w-full h-auto rounded-lg" alt="Preview">
            <div class="mt-4 bg-white p-4 rounded-lg">
                <h3 id="previewModalTitle" class="text-xl font-bold text-pink-600"></h3>
                <p id="previewModalTime" class="text-gray-500"></p>
            </div>
        </div>
    </div>

    <script>
        // 模拟数据存储
        let uploads = JSON.parse(localStorage.getItem('kittyUploads')) || [];
        
        // 为了演示，添加一些示例数据（如果没有数据的话）
        if (uploads.length === 0) {
            uploads = [
                {
                    id: 1,
                    fileName: '单词背诵截图1.jpg',
                    fileData: 'https://p26-doubao-search-sign.byteimg.com/isp-i18n-media/img/494b4ce3376749b0530da7d8a4a83377~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1794621742&x-signature=TMizkNOTHusELPqZ7L30nQcpusY%3D',
                    uploadTime: '2023-07-21 10:30:45',
                    status: 'approved'
                },
                {
                    id: 2,
                    fileName: '单词背诵截图2.jpg',
                    fileData: 'https://p11-doubao-search-sign.byteimg.com/labis/5feea20cba6880845205456dbf3239a4~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1794621742&x-signature=PjPIdXMpJ%2FKDPI8KDX1s8IzsXas%3D',
                    uploadTime: '2023-07-22 15:20:12',
                    status: 'pending'
                },
                {
                    id: 3,
                    fileName: '单词背诵截图3.jpg',
                    fileData: 'https://p26-doubao-search-sign.byteimg.com/labis/acaca119705bf765c09cc4d0a1a62593~tplv-be4g95zd3a-image.jpeg?lk3s=feb11e32&x-expires=1794621742&x-signature=un5nl3FGWtYcuehHVOOmnl%2F1CdI%3D',
                    uploadTime: '2023-07-23 09:45:33',
                    status: 'rejected'
                }
            ];
            localStorage.setItem('kittyUploads', JSON.stringify(uploads));
        }
        
        // DOM 元素
        const uploadsContainer = document.getElementById('uploadsContainer');
        const noUploadsMessage = document.getElementById('noUploadsMessage');
        const totalUploads = document.getElementById('totalUploads');
        const approvedUploads = document.getElementById('approvedUploads');
        const pendingUploads = document.getElementById('pendingUploads');
        const todayUploads = document.getElementById('todayUploads');
        const searchInput = document.getElementById('searchInput');
        const filterSelect = document.getElementById('filterSelect');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const pagination = document.getElementById('pagination');
        const previewModal = document.getElementById('previewModal');
        const closePreviewModal = document.getElementById('closePreviewModal');
        const previewModalImage = document.getElementById('previewModalImage');
        const previewModalTitle = document.getElementById('previewModalTitle');
        const previewModalTime = document.getElementById('previewModalTime');
        
        // 当前页码和每页显示数量
        let currentPage = 1;
        const itemsPerPage = 6;
        
        // 初始化页面
        function initPage() {
            updateStats();
            renderUploads();
            renderPagination();
            
            // 添加事件监听器
            searchInput.addEventListener('input', handleSearch);
            filterSelect.addEventListener('change', handleFilter);
            refreshBtn.addEventListener('click', handleRefresh);
            logoutBtn.addEventListener('click', handleLogout);
            closePreviewModal.addEventListener('click', () => {
                previewModal.classList.add('hidden');
            });
            
            // 点击模态框外部关闭
            previewModal.addEventListener('click', (e) => {
                if (e.target === previewModal) {
                    previewModal.classList.add('hidden');
                }
            });
        }
        
        // 更新统计信息
        function updateStats() {
            totalUploads.textContent = uploads.length;
            approvedUploads.textContent = uploads.filter(upload => upload.status === 'approved').length;
            pendingUploads.textContent = uploads.filter(upload => upload.status === 'pending').length;
            
            // 计算今日上传数量
            const now = new Date();
            const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            const todayCount = uploads.filter(upload => {
                return upload.uploadTime.startsWith(today);
            }).length;
            todayUploads.textContent = todayCount;
        }
        
        // 渲染上传记录
        function renderUploads() {
            // 清空容器
            uploadsContainer.innerHTML = '';
            
            // 获取过滤和搜索后的上传记录
            const filteredUploads = getFilteredUploads();
            
            // 显示无记录消息（如果没有记录）
            if (filteredUploads.length === 0) {
                noUploadsMessage.classList.remove('hidden');
                pagination.classList.add('hidden');
                return;
            }
            
            // 隐藏无记录消息
            noUploadsMessage.classList.add('hidden');
            pagination.classList.remove('hidden');
            
            // 分页
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedUploads = filteredUploads.slice(startIndex, endIndex);
            
            // 渲染上传记录
            paginatedUploads.forEach(upload => {
                const uploadElement = createUploadElement(upload);
                uploadsContainer.appendChild(uploadElement);
            });
        }
        
        // 创建上传记录元素
        function createUploadElement(upload) {
            const div = document.createElement('div');
            div.className = 'hello-kitty-card bg-white rounded-2xl overflow-hidden';
            
            // 设置状态样式
            let statusClass = '';
            let statusText = '';
            
            switch (upload.status) {
                case 'approved':
                    statusClass = 'status-approved';
                    statusText = '已审核';
                    break;
                case 'rejected':
                    statusClass = 'status-rejected';
                    statusText = '已拒绝';
                    break;
                default:
                    statusClass = 'status-pending';
                    statusText = '待审核';
            }
            
            div.innerHTML = `
                <div class="image-container cursor-pointer" data-id="${upload.id}">
                    <img src="${upload.fileData}" alt="${upload.fileName}" class="w-full h-48 object-cover">
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-pink-600 truncate">${upload.fileName}</h3>
                    <p class="text-sm text-gray-500">${upload.uploadTime}</p>
                    <div class="mt-4 flex justify-between">
                        <button class="action-btn bg-green-100 text-green-600 hover:bg-green-500 hover:text-white" data-id="${upload.id}" data-action="approve">
                            <i class="fa fa-check"></i>
                        </button>
                        <button class="action-btn bg-red-100 text-red-600 hover:bg-red-500 hover:text-white" data-id="${upload.id}" data-action="reject">
                            <i class="fa fa-times"></i>
                        </button>
                        <button class="action-btn bg-blue-100 text-blue-600 hover:bg-blue-500 hover:text-white" data-id="${upload.id}" data-action="delete">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            
            // 添加事件监听器
            div.querySelector('.image-container').addEventListener('click', () => {
                openPreviewModal(upload);
            });
            
            div.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); // 防止触发图片预览
                    const action = btn.getAttribute('data-action');
                    const id = parseInt(btn.getAttribute('data-id'));
                    handleAction(id, action);
                });
            });
            
            return div;
        }
        
        // 渲染分页
        function renderPagination() {
            // 清空分页容器
            pagination.innerHTML = '';
            
            // 获取过滤和搜索后的上传记录
            const filteredUploads = getFilteredUploads();
            
            // 计算总页数
            const totalPages = Math.ceil(filteredUploads.length / itemsPerPage);
            
            // 如果只有一页，不显示分页
            if (totalPages <= 1) {
                pagination.classList.add('hidden');
                return;
            }
            
            pagination.classList.remove('hidden');
            
            // 上一页按钮
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn mx-1';
            prevBtn.innerHTML = '<i class="fa fa-chevron-left"></i>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderUploads();
                    scrollToTop();
                }
            });
            pagination.appendChild(prevBtn);
            
            // 页码按钮
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn mx-1 ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => {
                    currentPage = i;
                    renderUploads();
                    scrollToTop();
                });
                pagination.appendChild(pageBtn);
            }
            
            // 下一页按钮
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn mx-1';
            nextBtn.innerHTML = '<i class="fa fa-chevron-right"></i>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderUploads();
                    scrollToTop();
                }
            });
            pagination.appendChild(nextBtn);
        }
        
        // 获取过滤和搜索后的上传记录
        function getFilteredUploads() {
            const searchTerm = searchInput.value.toLowerCase();
            const filterValue = filterSelect.value;
            
            return uploads.filter(upload => {
                // 搜索过滤
                const matchesSearch = upload.fileName.toLowerCase().includes(searchTerm) || 
                                     upload.uploadTime.toLowerCase().includes(searchTerm);
                
                // 状态过滤
                const matchesFilter = filterValue === 'all' || upload.status === filterValue;
                
                return matchesSearch && matchesFilter;
            }).sort((a, b) => new Date(b.uploadTime) - new Date(a.uploadTime)); // 按时间降序排序
        }
        
        // 处理搜索
        function handleSearch() {
            currentPage = 1;
            renderUploads();
            renderPagination();
        }
        
        // 处理过滤
        function handleFilter() {
            currentPage = 1;
            renderUploads();
            renderPagination();
        }
        
        // 处理刷新
        function handleRefresh() {
            // 重置搜索和过滤
            searchInput.value = '';
            filterSelect.value = 'all';
            currentPage = 1;
            
            // 重新渲染
            renderUploads();
            renderPagination();
            updateStats();
            
            // 添加刷新动画
            refreshBtn.classList.add('animate-spin');
            setTimeout(() => {
                refreshBtn.classList.remove('animate-spin');
            }, 1000);
        }
        
        // 处理退出登录
        function handleLogout() {
            // 在实际应用中，这里应该清除登录状态
            window.location.href = 'index.html';
        }
        
        // 处理操作按钮点击
        function handleAction(id, action) {
            const index = uploads.findIndex(upload => upload.id === id);
            
            if (index === -1) return;
            
            switch (action) {
                case 'approve':
                    uploads[index].status = 'approved';
                    break;
                case 'reject':
                    uploads[index].status = 'rejected';
                    break;
                case 'delete':
                    if (confirm('确定要删除这条记录吗？')) {
                        uploads.splice(index, 1);
                    } else {
                        return; // 取消删除
                    }
                    break;
            }
            
            // 保存更新后的数据
            localStorage.setItem('kittyUploads', JSON.stringify(uploads));
            
            // 更新页面
            renderUploads();
            updateStats();
        }
        
        // 打开预览模态框
        function openPreviewModal(upload) {
            previewModalImage.src = upload.fileData;
            previewModalTitle.textContent = upload.fileName;
            previewModalTime.textContent = upload.uploadTime;
            previewModal.classList.remove('hidden');
        }
        
        // 滚动到顶部
        function scrollToTop() {
            window.scrollTo({
                top: uploadsContainer.offsetTop - 20,
                behavior: 'smooth'
            });
        }
        
        // 页面加载时检查登录状态
        window.addEventListener('load', () => {
            // 简单的登录验证，实际应用中应该使用更安全的验证方式
            const isLoggedIn = true; // 假设已经登录
            if (!isLoggedIn) {
                // 如果没有登录，重定向到登录页面
                window.location.href = 'index.html';
            }
            
            initPage();

            // 使用GSAP动画（安全检查元素是否存在）
            if (document.querySelector('nav')) {
                gsap.from('nav', { y: -50, opacity: 0, duration: 1, ease: 'power3.out' });
            }
            if (document.querySelector('.hello-kitty-card')) {
                gsap.from('.hello-kitty-card', { y: 50, opacity: 0, duration: 1, delay: 0.2, stagger: 0.1, ease: 'power3.out' });
            }
        });
    </script>
</body>
</html>
