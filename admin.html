<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>单词打卡-管理员后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet" />
  <script>tailwind.config={theme:{extend:{colors:{pink:{500:"#FF9AA2"}}}}}</script>
  <style>
    body { background: #FFF5F5; }
    .img-checkin { max-width: 100%; max-height: 220px; border-radius: 12px; }
    .btn-danger { background:#ef4444;color:white;padding:10px 20px;border-radius:99px;border:none;font-weight:bold;cursor:pointer; }
    .btn-danger:hover { background:#dc2626; }
  </style>
</head>
<body>
<nav class="bg-pink-500 text-white px-4 py-3 flex justify-between items-center">
  <span class="text-xl font-bold">💖 单词打卡 · 管理员后台</span>
  <div class="flex gap-3">
    <!-- 【一键恢复第一天打卡】按钮 -->
    <button class="btn-danger" onclick="resetFirstDay()">🔄 一键恢复第一天打卡</button>
    <button onclick="location.href='index.html'" class="bg-white text-pink-500 px-4 py-2 rounded-full">退出登录</button>
  </div>
</nav>

<div class="max-w-4xl mx-auto px-4 mt-8">
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white p-4 rounded-xl text-center"><div class="text-2xl font-bold text-pink-500" id="total">0</div><div class="text-sm">总打卡</div></div>
    <div class="bg-white p-4 rounded-xl text-center"><div class="text-2xl font-bold text-green-500" id="pass">0</div><div class="text-sm">已通过</div></div>
    <div class="bg-white p-4 rounded-xl text-center"><div class="text-2xl font-bold text-yellow-500" id="wait">0</div><div class="text-sm">待审核</div></div>
  </div>

  <div class="bg-white p-6 rounded-xl">
    <h2 class="text-xl font-bold text-pink-500 mb-4">📷 打卡图片审核列表（可直接查看）</h2>
    <div id="listBox" class="space-y-6">
      <div class="text-center text-gray-500 py-8">暂无打卡记录，请用户端上传</div>
    </div>
  </div>
</div>

<script>
// 读取打卡数据
let checkList=JSON.parse(localStorage.getItem("checkinList"))||[];

// 统计
document.getElementById("total").innerText=checkList.length;
document.getElementById("pass").innerText=checkList.filter(i=>i.status==="pass").length;
document.getElementById("wait").innerText=checkList.filter(i=>i.status==="pending").length;

// 渲染图片
const box=document.getElementById("listBox");
if(checkList.length>0){
  box.innerHTML="";
  checkList.forEach((item,idx)=>{
    const div=document.createElement("div");
    div.className="border-b pb-4";
    div.innerHTML=`
      <div class="flex flex-col md:flex-row gap-4 items-start">
        <img src="${item.img}" class="img-checkin shadow-md">
        <div class="flex-1">
          <p class="font-bold">打卡时间：${item.time}</p>
          <p class="text-sm text-gray-500 mt-1">状态：${item.status==="pending"?"⏳待审核":"✅已通过"}</p>
          <div class="flex gap-3 mt-3">
            <button onclick="passCheck(${idx})" class="bg-green-500 text-white px-4 py-2 rounded-lg">✅ 通过打卡</button>
            <button onclick="delCheck(${idx})" class="bg-red-500 text-white px-4 py-2 rounded-lg">🗑 删除记录</button>
          </div>
        </div>
      </div>
    `;
    box.appendChild(div);
  })
}

// ✅ 一键恢复第一天打卡（清空所有记录，回到初始）
function resetFirstDay(){
  if(confirm("⚠️ 确定要一键恢复第一天打卡吗？所有打卡记录、图片将全部清空，不可恢复！")){
    localStorage.removeItem("checkinList");
    alert("✅ 已一键恢复！所有打卡记录清空，回到第一天！");
    location.reload();
  }
}

// 通过打卡
function passCheck(idx){
  checkList[idx].status="pass";
  localStorage.setItem("checkinList",JSON.stringify(checkList));
  alert("✅ 已通过！宝宝爱情值+5！");
  location.reload();
}

// 删除记录
function delCheck(idx){
  checkList.splice(idx,1);
  localStorage.setItem("checkinList",JSON.stringify(checkList));
  alert("🗑 已删除该打卡记录！");
  location.reload();
}
</script>
</body>
</html>
